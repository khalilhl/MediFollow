apiVersion: apps/v1
kind: Deployment
metadata:
  name: medifollow-frontend-deployment
  namespace: medifollow-staging
  labels:
    app: medifollow-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medifollow-frontend
  template:
    metadata:
      labels:
        app: medifollow-frontend
    spec:
      containers:
      - name: medifollow-frontend
        image: medifollow-front:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 5
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
