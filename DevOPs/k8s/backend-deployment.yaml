apiVersion: apps/v1
kind: Deployment
metadata:
  name: medifollow-backend-deployment
  namespace: medifollow-staging
  labels:
    app: medifollow-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medifollow-backend
  template:
    metadata:
      labels:
        app: medifollow-backend
    spec:
      containers:
      - name: medifollow-backend
        image: medifollow-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: medifollow-secrets
        readinessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 5
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
