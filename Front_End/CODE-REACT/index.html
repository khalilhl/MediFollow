<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function () {
      const savedTheme = sessionStorage.getItem('themeColor');

      if (savedTheme) {
        const settings = JSON.parse(savedTheme);
        document.documentElement.setAttribute('data-bs-theme', settings);
      }
    })();
    (function () {
      try {
        if (localStorage.getItem("medifollow_dyslexia_mode") === "1") {
          document.documentElement.classList.add("medifollow-dyslexia-mode");
        }
      } catch (e) { /* ignore */ }
    })();
  </script>
  <!-- Polices : une seule feuille, display=optional pour limiter le CLS (évite swap tardif) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Poppins:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200&family=Roboto:wght@400;700&family=Roboto+Condensed:wght@400;700&display=optional" />
  <!-- Icônes : CDN en non-bloquant (évite d’alourdir le bundle JS/CSS Vite → meilleur TBT qu’avec FA5+BI en npm) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preload" as="style"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" /></noscript>
  <link rel="preload" as="style"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" /></noscript>
  <title>MediFollow | React </title>
</head>

<body>
  <div id="root"></div>
  <!-- TensorFlow.js pour le modèle d’émotion : importé dans src/services/face-emotions.js (pas en global : sinon conflit avec face-api.js / tfjs-core 1.7) -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
